<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.C. Casa de Dios Valdemoro</title>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            font-family: sans-serif; 
            background-image: url('fondo.jpg'); 
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            background-size: cover; 
            background-color: #1a1a1a; 
            color: white; 
        }
        /* Menú de navegación corregido */
        nav {
            background-color: #111;
            padding: 20px 0;
            text-align: center;
            border-bottom: 2px solid #B08A3E;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            font-size: 0.9em;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .capa { 
            background: rgba(0, 0, 0, 0.6);
            min-height: calc(100vh - 65px); /* Ajusta para que no sobre espacio */
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 20px; 
            box-sizing: border-box; 
        }
        .caja { 
            background: white; 
            color: #333;
            max-width: 600px; 
            width: 100%; 
            padding: 40px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .horarios { 
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin: 25px 0; 
        }
        .dia { 
            background: #f9f9f9; 
            padding: 15px; 
            border-radius: 12px; 
            border-top: 5px solid #B08A3E; 
        }
        .whatsapp { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .whatsapp img { width: 60px; height: 60px; border-radius: 50%; }
        h1 { color: #B08A3E; margin: 0; font-size: 2em; }
    </style>
</head>
<body>

    <nav>
        <a href="#">INICIO</a>
        <a href="#">CREEMOS</a>
        <a href="#">VISIÓN</a>
        <a href="#">REUNIONES</a>
        <a href="#">UBICACIÓN</a>
    </nav>

    <div class="capa">
        <div class="caja">
            <h1>CASA DE DIOS</h1>
            <h2 style="margin: 0; color: #777; font-size: 1.1em; letter-spacing: 2px;">VALDEMORO</h2>
            <p style="margin-top: 10px;"><i>"Nuestra Casa, Tu Casa"</i></p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">
            <h3 style="margin-bottom: 20px;">NUESTRAS REUNIONES</h3>
            <div class="horarios">
                <div class="dia"><b style="color:#B08A3E">JUEVES</b><br>18:00h<br><small>Mujeres</small></div>
                <div class="dia"><b style="color:#B08A3E">VIERNES</b><br>20:00h<br><small>Oración</small></div>
                <div class="dia"><b style="color:#B08A3E">SÁBADO</b><br>20:00h<br><small>Estudio</small></div>
                <div class="dia"><b style="color:#B08A3E">DOMINGO</b><br>11:30h<br><small>Culto General</small></div>
            </div>
            <p style="font-size: 1.1em;">📍 <b>Calle de las Vacas, 6, Valdemoro</b></p>
        </div>
    </div>

    <a href="https://wa.me/34685110296" class="whatsapp" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>

</body>
</html>
