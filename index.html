<!DOCTYPE html>
<html lang="es">
<head>

        .whatsapp { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .whatsapp img { width: 60px; height: 60px; border-radius: 50%; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3)); }
        h1 { color: #B08A3E; margin: 0; font-size: 2em; }
    </style>
</head>

            <p style="font-size: 1.1em;">📍 <b>Calle de las Vacas, 6, Valdemoro</b></p>

    </div>

</html>
